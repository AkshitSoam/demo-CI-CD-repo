steps:
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build',
    '-t',
    'us-central1-docker.pkg.dev/$PROJECT_ID/demo-repo/app:$BUILD_ID',
    '.'
  ]

- name: 'gcr.io/cloud-builders/docker'
  args: [
    'push',
    'us-central1-docker.pkg.dev/$PROJECT_ID/demo-repo/app:$BUILD_ID'
  ]

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - deploy
  - releases
  - create
  - release-$BUILD_ID
  - --delivery-pipeline=demo-pipeline
  - --region=us-central1
  - --images=app=us-central1-docker.pkg.dev/$PROJECT_ID/demo-repo/app:$BUILD_ID

images:
- us-central1-docker.pkg.dev/$PROJECT_ID/demo-repo/app:$BUILD_ID

options:
  logging: CLOUD_LOGGING_ONLY
