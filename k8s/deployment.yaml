apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      nodeSelector:
        env: dev   # 👈 REQUIRED (base value)
      containers:
      - name: app
        image: app
        ports:
        - containerPort: 8080
